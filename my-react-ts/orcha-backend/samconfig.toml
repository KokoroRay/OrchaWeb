# SAM CLI Configuration
# Deploy is handled by GitHub Actions CI/CD (.github/workflows/deploy.yml)
# All parameters are passed via --parameter-overrides from GitHub Secrets
#
# For manual deploy:
#   sam build
#   sam deploy --guided

version = 0.1

[default]
[default.global.parameters]
stack_name = "orcha-backend"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true
region = "ap-southeast-1"
