name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.ts'
  workflow_dispatch:  # Cho phép trigger thủ công

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Create .env from secrets
      run: |
        cat > .env << EOF
        VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL || secrets.API_BASE_URL }}
        VITE_COGNITO_USER_POOL_ID=${{ secrets.VITE_COGNITO_USER_POOL_ID || secrets.COGNITO_USER_POOL_ID }}
        VITE_COGNITO_CLIENT_ID=${{ secrets.VITE_COGNITO_CLIENT_ID || secrets.COGNITO_CLIENT_ID }}
        VITE_COGNITO_REGION=ap-southeast-1
        VITE_COGNITO_DOMAIN=${{ secrets.VITE_COGNITO_DOMAIN || secrets.COGNITO_DOMAIN }}
        VITE_COGNITO_REDIRECT_URI=${{ secrets.VITE_COGNITO_REDIRECT_URI || 'https://orcha.io.vn/' }}
        VITE_COGNITO_LOGOUT_URI=${{ secrets.VITE_COGNITO_LOGOUT_URI || 'https://orcha.io.vn/' }}
        VITE_CLOUDINARY_CLOUD_NAME=${{ secrets.VITE_CLOUDINARY_CLOUD_NAME || secrets.CLOUDINARY_CLOUD_NAME }}
        VITE_CLOUDINARY_UPLOAD_PRESET=${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET || secrets.CLOUDINARY_UPLOAD_PRESET }}
        VITE_ENABLE_COD=true
        VITE_ENABLE_PAYOS=true
        VITE_PAYOS_CLIENT_ID=${{ secrets.VITE_PAYOS_CLIENT_ID || secrets.PAYOS_CLIENT_ID }}
        VITE_PAYOS_API_KEY=${{ secrets.VITE_PAYOS_API_KEY || secrets.PAYOS_API_KEY }}
        VITE_PAYOS_CHECKSUM_KEY=${{ secrets.VITE_PAYOS_CHECKSUM_KEY || secrets.PAYOS_CHECKSUM_KEY }}
        EOF

    - name: Validate required env vars
      run: |
        required_vars=(
          "VITE_API_BASE_URL"
          "VITE_COGNITO_USER_POOL_ID"
          "VITE_COGNITO_CLIENT_ID"
          "VITE_COGNITO_DOMAIN"
          "VITE_COGNITO_REDIRECT_URI"
        )

        for var_name in "${required_vars[@]}"; do
          var_value=$(grep "^${var_name}=" .env | sed "s/^${var_name}=//")
          if [ -z "$var_value" ]; then
            echo "❌ Missing required env var: ${var_name}"
            exit 1
          fi
        done

        echo "✅ Required env vars are present"

    - name: Build application
      run: npm run build

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    - name: Deployment successful
      if: success()
      run: |
        echo "✅ Frontend deployed successfully!"
        echo "🌐 Live at: https://orcha.io.vn"
        echo "📝 Make sure backend CORS allows this origin"
